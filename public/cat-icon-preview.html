<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Cat Icon Preview</title>
<style>
  body { background: #f0f2f5; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 40px; }
  .row { display: flex; gap: 32px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
  .card { background: white; border-radius: 16px; padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .label { font-size: 13px; color: #666; font-weight: 600; }
  .sizes { display: flex; gap: 16px; align-items: center; }
  h2 { color: #333; margin: 0; }
</style>
</head>
<body>

<h2>🐾 CatBook Icon — ตัวอย่าง 2 แมว</h2>

<div class="row">

  <!-- Style 1: Minimal Geometric -->
  <div class="card">

    <div class="sizes">

        <circle cx="15" cy="27" r="1.2" fill="#4267B2"/>

        <path d="M54,44 Q56,38 52,36" stroke="#f5a623" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <svg width="16" height="16" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

      </svg>
    </div>
    <div class="label">64px · 32px · 16px</div>
  </div>

  <!-- Style 2: Rounded Duo -->

        <ellipse cx="22" cy="35" rx="11" ry="10" fill="white"/>
        <ellipse cx="22" cy="34" rx="10" ry="9" fill="white"/>
        <!-- ears -->
        <polygon points="14,26 12,18 20,24" fill="white"/>
        <polygon points="30,26 32,18 24,24" fill="white"/>
        <!-- inner ears -->
        <polygon points="15,25 13.5,20 19,23.5" fill="#ffc0cb"/>
        <polygon points="29,25 30.5,20 25,23.5" fill="#ffc0cb"/>
        <!-- face -->
        <circle cx="18.5" cy="33" r="1.5" fill="#4267B2"/>
        <circle cx="25.5" cy="33" r="1.5" fill="#4267B2"/>
        <path d="M20,36 Q22,38 24,36" stroke="#4267B2" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- Right cat (gold) -->
        <ellipse cx="42" cy="35" rx="11" ry="10" fill="#f5a623"/>
        <polygon points="34,26 32,18 40,24" fill="#f5a623"/>
        <polygon points="50,26 52,18 44,24" fill="#f5a623"/>
        <polygon points="35,25 33.5,20 39,23.5" fill="#ffda85"/>
        <polygon points="49,25 50.5,20 45,23.5" fill="#ffda85"/>

        <circle cx="45.5" cy="33" r="1.5" fill="white"/>
        <path d="M40,36 Q42,38 44,36" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- they're touching/close -->
        <circle cx="32" cy="34" r="1" fill="#e0e0e0" opacity="0.5"/>
      </svg>
      <svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="32" fill="#4267B2"/>
        <ellipse cx="22" cy="35" rx="11" ry="10" fill="white"/>
        <polygon points="14,26 12,18 20,24" fill="white"/>
        <polygon points="30,26 32,18 24,24" fill="white"/>

        <polygon points="29,25 30.5,20 25,23.5" fill="#ffc0cb"/>
        <circle cx="18.5" cy="33" r="1.5" fill="#4267B2"/>
        <circle cx="25.5" cy="33" r="1.5" fill="#4267B2"/>
        <path d="M20,36 Q22,38 24,36" stroke="#4267B2" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <ellipse cx="42" cy="35" rx="11" ry="10" fill="#f5a623"/>
        <polygon points="34,26 32,18 40,24" fill="#f5a623"/>
        <polygon points="50,26 52,18 44,24" fill="#f5a623"/>
        <polygon points="35,25 33.5,20 39,23.5" fill="#ffda85"/>
        <polygon points="49,25 50.5,20 45,23.5" fill="#ffda85"/>
        <circle cx="38.5" cy="33" r="1.5" fill="white"/>
        <circle cx="45.5" cy="33" r="1.5" fill="white"/>
        <path d="M40,36 Q42,38 44,36" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </svg>
      <svg width="16" height="16" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="32" fill="#4267B2"/>
        <ellipse cx="22" cy="35" rx="11" ry="10" fill="white"/>

        <polygon points="30,26 32,18 24,24" fill="white"/>
        <circle cx="18.5" cy="33" r="1.5" fill="#4267B2"/>
        <circle cx="25.5" cy="33" r="1.5" fill="#4267B2"/>
        <ellipse cx="42" cy="35" rx="11" ry="10" fill="#f5a623"/>
        <polygon points="34,26 32,18 40,24" fill="#f5a623"/>
        <polygon points="50,26 52,18 44,24" fill="#f5a623"/>
        <circle cx="38.5" cy="33" r="1.5" fill="white"/>
        <circle cx="45.5" cy="33" r="1.5" fill="white"/>
      </svg>
    </div>
    <div class="label">64px · 32px · 16px</div>
  </div>

  <!-- Style 3: Silhouette -->
